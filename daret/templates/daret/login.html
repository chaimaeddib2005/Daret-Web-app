{% extends 'daret/base.html' %}
{% block title %}Sign In — DARET{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <a href="#">DARET</a>
      <p>Rotating savings, built on trust</p>
    </div>
    <h2>Welcome back</h2>
    {% if form.errors %}
    <div class="alert alert-error">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus required placeholder="your_username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
    <p class="auth-footer">No account yet? <a href="{% url 'register' %}">Register here</a></p>
  </div>
</div>
{% endblock %}
